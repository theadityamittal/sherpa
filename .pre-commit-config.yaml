repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.7
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.9.0
    hooks:
      - id: mypy
        additional_dependencies:
          - pydantic-settings
          - boto3-stubs
        args: [--ignore-missing-imports]
        pass_filenames: false
        entry: mypy src/

  - repo: local
    hooks:
      - id: pytest-check
        name: pytest
        entry: .venv/bin/pytest tests/unit/ -x -q --no-header --tb=line
        language: system
        types: [python]
        pass_filenames: false
        stages: [pre-commit]
      - id: sam-validate
        name: sam validate
        entry: sam validate --template infra/template.yaml --lint
        language: system
        files: ^infra/template\.yaml$
        pass_filenames: false
        stages: [pre-commit]
