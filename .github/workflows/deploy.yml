name: 'Deploy'

on:
  workflow_run:
    workflows: ['Unit Tests', 'Integration Tests']
    types: [completed]
    branches: [main]

concurrency:
  group: deploy-${{ github.event.workflow_run.head_sha }}
  cancel-in-progress: true

jobs:
  check-gate:
    if: github.event.workflow_run.conclusion == 'success' && vars.DEPLOY_ENABLED == 'true'
    runs-on: ubuntu-latest
    permissions:
      actions: read
    outputs:
      should_deploy: ${{ steps.check.outputs.should_deploy }}
    steps:
      - name: Check both workflows passed
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          SHA="${{ github.event.workflow_run.head_sha }}"
          REPO="${{ github.repository }}"

          unit_conclusion=$(gh api "repos/$REPO/actions/workflows/ci-unit.yml/runs?head_sha=$SHA&per_page=1" --jq '.workflow_runs[0].conclusion')
          integration_conclusion=$(gh api "repos/$REPO/actions/workflows/ci-integration.yml/runs?head_sha=$SHA&per_page=1" --jq '.workflow_runs[0].conclusion')

          echo "Unit Tests: $unit_conclusion"
          echo "Integration Tests: $integration_conclusion"

          if [ "$unit_conclusion" = "success" ] && [ "$integration_conclusion" = "success" ]; then
            echo "should_deploy=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_deploy=false" >> "$GITHUB_OUTPUT"
            echo "Waiting for both workflows to pass"
          fi

  deploy:
    needs: check-gate
    if: needs.check-gate.outputs.should_deploy == 'true'
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set up AWS SAM CLI
        uses: aws-actions/setup-sam@v2

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1

      - name: SAM Build
        run: sam build --template infra/template.yaml

      - name: SAM Deploy
        run: |
          sam deploy \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --resolve-s3 \
            --stack-name onboard-assist \
            --capabilities CAPABILITY_IAM

      - name: Deployment Status
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "Deployment successful"
          else
            echo "Deployment failed"
          fi
